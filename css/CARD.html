<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Card</title>
    <style>
        * {
            background-color: gainsboro;

        }

        .border {

            border: 1px solid rgb(182, 181, 181);
            border-radius: 5px;
            height: 95vh;
            width: 30vw;
            background-color: aliceblue;
            margin: auto;
        }

        div div img {
            width: 158px;
            height: 110px;
            border-radius: 5px;
            padding: 2px;
            background-color: rgb(255, 255, 255);

            margin: auto;
        }

        .bg {
            background-color: rgb(255, 255, 255);

        }

        span {
            border: 0.4px solid rgb(182, 181, 181);
            color: rgb(104, 104, 104);
            margin: 2PX;
            padding: 5px;

            background-color: rgb(255, 255, 255);
            font-size: 5PX;
            border-radius: 15px;
        }

        div h5 {
            margin: auto;
            background-color: rgb(255, 255, 255);
            font-size: 14px;
            margin-top: 10px;
            text-align: center;

        }

        #p p {
            font-size: 6px;
            background-color: rgb(255, 255, 255);

            padding: 4px;
            display: flex;
            color: rgb(104, 104, 104);
        }

        #button button {
            background-color: rgb(193, 216, 246);
            height: 15px;
            width: 45px;
            color: rgb(15, 62, 230);
            border: none;
            padding: 7px;
            border-radius: 10px;
            display: flex;
            margin: auto;
            font-size: 5px;
            justify-content: center;
            font-weight: bold;

        }
    </style>
</head>

<body>
    <div class="border">
        <div class="bg">
            <img src="https://tse1.mm.bing.net/th/id/OIP.7uhNISUtLvs-avTaHIY1HAHaEK?pid=Api&h=220&P=0" alt="">
        </div>
        <span>AI</span>
        <span>Robo</span>
        <div>
            <h5>AI is the Future</h5>
        </div>
        <div id="p">
            <p>Artificial intelligence (AI) is the capability of computational systems to perform tasks typically
                associated with human intelligence, such as learning, reasoning, problem-solving, perception, and
                decision-making.</p>
        </div>
        <div id="button" class="bg">
            <button>Read More</button>
        </div>

    </div>
</body>

</html>
