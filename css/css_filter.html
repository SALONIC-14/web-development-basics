<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter</title>
    <style>
        .con{
            display: flex;
            width: 94vw;
            height: 60vh;
            border: 2px solid black;
        }
        .box{

            justify-self: auto;
            display: flex;
            width: 119px;
            height: 100px;
            border: 2px solid rgb(255, 0, 0);
            

        }
        img{
            display: flex;
            width: 119px;
            height: 100px;
        }
        .img1{
            filter:blur(1px);
        }
        .img2{
            filter:brightness(3) ;
        }
        .img3{
            filter:contrast(111%) ;
        }
        .img4{
            filter: drop-shadow(46px 6px 20px rgb(18, 17, 17)) 
        }
        .img5{
            filter:invert(78%) ;
        }
       
    </style>
</head>
<body>
    <div class="con">
        <div class="box img1">
            <img src="https://tse4.mm.bing.net/th/id/OIP.88HcVUC7JFs2ywTCLT86mwHaEU?pid=Api&P=0&h=220" alt="logo">
        </div>
        <div class="box img5">
            <img src="https://tse4.mm.bing.net/th/id/OIP.88HcVUC7JFs2ywTCLT86mwHaEU?pid=Api&P=0&h=220" alt="logo">
        </div>
        <div class="box img2">
            <img src="https://tse4.mm.bing.net/th/id/OIP.88HcVUC7JFs2ywTCLT86mwHaEU?pid=Api&P=0&h=220" alt="logo">
        </div>
        <div class="box img3">
            <img src="https://tse4.mm.bing.net/th/id/OIP.88HcVUC7JFs2ywTCLT86mwHaEU?pid=Api&P=0&h=220" alt="logo">
        </div>
        <div class="box img4">
            <img src="https://tse4.mm.bing.net/th/id/OIP.88HcVUC7JFs2ywTCLT86mwHaEU?pid=Api&P=0&h=220" alt="logo">
        </div>
    </div>
</body>
</html>
