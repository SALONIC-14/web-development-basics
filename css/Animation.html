<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        .con {
            display: flex;
            border: none;
            width: 100vw;
            height: 70vh;
            border-radius: 5px;
            background-color: aqua;
            justify-content: flex-start;
            align-items: center;
            align-self: start;
            justify-self: center;

        }

        .box {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 9vw;
            height: 12vh;
            color: rgb(255, 255, 255);
            border: 2px solid black;
            background-color: rgb(0, 0, 0);
            border-radius: 2PX;

            /* animation: name duration timing-function delay iteration-count direction fill-mode; */
            animation: r 6s ease 1s infinite forwards;




        }

        .box1 {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 100%;
            color: rgb(255, 255, 255);
            align-self: end;

            background-color: rgb(0, 0, 0);
            animation: b 6s ease 1s infinite forwards;
        }
        .box2{
            
            
            align-self: start;
            animation: m 6s ease 1s infinite forwards;
        }

        @keyframes m {
            0% {
                transform: translateX(0) rotate(0deg);
            }

            100% {
                transform: translateX(90vw) rotate(360deg);
            }
        }

            @keyframes b {
                from {
                    transform: translateX(0vw) rotate(0deg);
                }

                to {
                    transform: translateX(100vw) rotate(100deg);
                    background-color: black;
                    color: white;

                }

            }

            @keyframes r {
                0% {
                    transform: translateX(0) rotate(0deg);
                }

                10% {
                    transform: translateX(10vw) rotate(36deg);
                }

                20% {
                    transform: translateX(20vw) rotate(72deg);
                }


                30% {
                    transform: translateX(30vw) rotate(108deg);
                }

                40% {
                    transform: translateX(40vw) rotate(144deg);
                }

                50% {
                    transform: translateX(50vw) rotate(180deg);
                }

                60% {
                    transform: translateX(60vw) rotate(216deg);
                }

                70% {
                    transform: translateX(70vw) rotate(252deg);
                }

                80% {
                    transform: translateX(80vw) rotate(288deg);
                }

                90% {
                    transform: translateX(90vw) rotate(324deg);
                }

                100% {
                    transform: translateX(100vw) rotate(360deg);
                }


                /* @keyframes p {
            10%{
                background-color:white ;
            }
            40%{
                background-color:rgb(248, 174, 174) ;
            }
            60%{
                background-color:rgb(130, 78, 78) ;
            }
            80%{
                background-color:rgb(60, 41, 41) ;
            }
            90%{
                background-color:rgb(37, 27, 27) ;
            } */

            }
    </style>
</head>

<body>
    <div class="con">
        <div class="box">
            BOX
        </div>
        <DIV class="box1">BOX</DIV>
        <div class="box box2">Box</div>
    </div>
</body>

</html>
