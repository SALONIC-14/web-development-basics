<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Playground</title>
  <style>
        h1{
            color: white;              /* text color */
            background-color: teal;    /* background color */
            padding: 10px;
        }
        p {
            font-size: 18px;           /* text size */
            font-family: Arial, sans-serif; /* font style */
            line-height: 1.5;          /* space between lines */
            text-align: justify;       /* align text */
        }
        button {
            padding: 10px 20px;       /* space inside button */
            margin: 15px;             /* space outside button */
            border: 2px solid blue;   /* button border */
            border-radius: 8px;       /* rounded corners */
            background-color: lightyellow;
        }
        button:hover {
            background-color: rgb(255, 95, 207);
            color: white;
            cursor: pointer;
        }
        button {
  transition: 0.3s ease;   /* smooth effect */
  box-shadow: 3px 3px 5px rgba(0,0,0,0.3);
}
button:hover {
  transform: scale(1.4);   /* make it grow a bit */
}
  </style>
</head>
<body>
  <h1>Hello CSS!</h1>
  <p>This is a simple paragraph for testing styles.</p>
  <button>Click Me</button>
</body>
</html>
