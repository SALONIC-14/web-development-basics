<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css_position</title>
    <style>
        .box {
            width: 80vw;
            height: 120px;
            border: 2px solid black;
            padding: 2px;
            margin: 6px;
        }

        .box1 {
            background-color: rgb(110, 217, 252);
            text-align: center;
            

        }

        .box2 {
            background-color: bisque;
            text-align: center;
            position: relative;
            left: 33px;
            bottom: 100px;

        }

        .box3 {
            background-color: rgb(132, 132, 246);
            text-align: center;
            position: relative;
            left: 66px;
            bottom: 200px;
            /* z-index: 1; */

        }

        .box4 {
            background-color: rgb(184, 238, 131);
            text-align: center;
            position: relative;
            left: 99px;
            bottom: 300px;


        }
        .a{
            border: 3px solid black;
            height: 20px;
            width: 100vw;
            bottom: 0;
            text-align: center;
            position: fixed;
            background-color: moccasin;
            padding-right:12px ;
            
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1">BOX1</div>
        <div class="box box2">BOX2</div>
        <div class="box box3">BOX3</div>
        <div class="box box4">BOX4</div>
        <div class="a">HOME CONTACT ABOUT</div>
    </div>
</body>

</html>
