<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex-Box</title>
    <style>
        .container{
            border: 2px solid;
            display:flex;
            height: 80vh;
            justify-content:center;
            align-items: center;
            

        }
        .item{
           height: 50px;
           width: 100px;
           background-color: rgb(244, 252, 5);
           border: 2px solid rgb(255, 0, 43);
           margin: 4px;

        }
        .o1{
            order:1;
        }
        .o2{
            order:2;
        }
        .o3{
            order:3;
        }
        .o4{
            order:4;
        }
        .o5{
            order:5;
        }
        .o6{
            order:6;
        }
        .o7{
            order:7;
        }
        .o8{
            order:8;
        }
        .o9{
            order:9;
        }
        .o10{
            order:10;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item o10">1</div>
        <div class="item o9">2</div>
        <div class="item o8">3</div>
        
        <div class="item o7">4</div>
        <div class="item o6">5</div>
        <div class="item o5">6</div>
        <div class="item o4">7</div>
        <div class="item o3">8</div>
        <div class="item o2">9</div>
        <div class="item o1">10</div>
    </div>
</body>
</html>
