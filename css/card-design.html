<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card-design</title>
    <style>
        * {
            margin: 1px;


        }

        body {
            background-color: rgb(166, 162, 162);
        }

        .maindiv {
            height: 453px;
            width: 405px;
            border: 1px solid rgb(71, 69, 69);
            background-color: aliceblue;
            border-radius: 7px;
        }

        .maindiv img {
            height: 210px;
            width: 395px;
            border-radius: 7px;
            margin-left: 5px;
            margin-top: 3px;
        }

        .s {
            margin-top: 8px;
            margin-left: 10px;
        }

        span {
            border: 0.4px solid rgb(182, 181, 181);


            margin-left: 5px;
            border-radius: 18px;
            padding: 2px 13px 2px 13px;
            font-size: 14px;
            color: rgb(113, 118, 121);

        }
        .text{
            margin-top: 19px;
        }

        h2 {
            margin-left: 13px;
            font-size: 22px;
            color: rgb(49, 49, 49);
            
        }
        p{
            padding: 13px;
            color: rgb(153, 161, 161);
        }
        .b{ 
            text-align: center;
            margin-top: 10px;
        }
        button{
            height: 36px;
            width: 100px;
            padding: 6px 13px 6px 13px ;
            color: rgb(47, 47, 246);
            background-color: rgb(198, 227, 246);
            border-radius: 15px;
            border: none;
            font-weight: bold;
            font-size: 12px;
            
            

        }
        button:hover{
            background-color: rgb(0, 0, 239);
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="maindiv">
        <img src="https://tse2.mm.bing.net/th/id/OIP.6NUu1Q-r8hpZ_R3A3dRegwHaEs?pid=Api&h=220&P=0" alt="">

        <div class="s">
            <span>Nature</span>
            <span>Lake</span>
        </div>
        <div class="text">
            <h2>The Nature Love</h2>
            <p>
                Lorem ipsum dolor sit amet consectetur, adipisicing elit. Est quisquam repudiandae itaque obcaecati
                aliquid? Facere quibusdam, minima beatae ex labore aliquid qui id eos, amet modi voluptas quasi, libero
                ipsam.
            </p>
        </div>
            <div class="b">
                <button>Read more </button>
            </div>
        </div>

    </div>

</body>

</html>
