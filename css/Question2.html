<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colors</title>
    <style>
     div p:first-child {
        color: red;
        background-color: yellow;
     }
     div p:not(:first-child){
        color: white;
        background-color: blue;

     }
    </style>
</head>
<body>
    <div>
        <p>This is Text from 1st paragraph</p>
        <p>This is Text from 2nd paragraph</p>
        <p>This is Text from 3rd paragraph</p>
        <p>This is Text from 4th paragraph</p>
        <p>This is Text from 5th paragraph</p>
    </div>
</body>
</html>
