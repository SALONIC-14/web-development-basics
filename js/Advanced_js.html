<body>
    <script>
        // 1. ************IIFE ***********
        // IS A An IIFE (Immediately Invoked Function Expression) is exactly what it sounds like:
        // A function that is defined and executed immediately.

        async function sleep() {
            return new Promise((resolve, reject) => {
                setTimeout(()=>{
                resolve(33)
                },1000)
            })
            
        }
        // to run this we make one more function so without the fuction we use IIFE
        (async function  main() {
            let a = await sleep();
            console.log(a);
            
            
        })()
        // This → (function(){}) = function expression
        // This → (function(){})() = IIFE (executed immediately)



        // 2 *********** DESTRUCTURING***************
        // Destructuring is just a shortcut to extract values from arrays or objects into variables — instead of writing repetitive, ugly code.

        // ---------------Without destructuring (old way)
        // let arr = [10, 20, 30];

        // let a = arr[0];
        // let b = arr[1];
        // let c = arr[2];

        //  WITH DESTRUCTURING

            let [a,b]=[1,2]
            console.log('a and b',a ,b);

            let [c,d, ...rest]=[1,2,3,4,5,6,7]
            console.log('rest ' , rest);

            let obj={
                x:1,
                y:2,
                z:3
            }
            
            let {x,y,z}=obj
            console.log('obj',x,y,z);
            
            // 3************* Spread operator ***************
            // It expands (spreads out) elements of an array or object.
            let arr=[1,2,3,4,5]
            function sum(a, b, c, d, e) {
                return a + b + c + d + e;
            }

            console.log('sum of arr',sum(...arr));
            // let arr = [1, 2, 3];

            //     ******// Spread → expand******
            //     console.log(...arr); // 1 2 3

            //    ******** // Destructuring → extract******
            //     let [a, b, c] = arr;



            // 4.*********HOISTING*********
            // Hoisting means:

            // JavaScript moves declarations to the top of their scope before execution.
            // used only for var not let and const
            greet();
            console.log('f',f); // give undefined
            
            function greet() {
                console.log("Hello");
            }
            var f=4; 

            </script>
