<!-- Event Bubbling is a process where an event starts from the target element and then propagates (moves) upward to its parent elements, one by one, up to the document. -->
<!-- 
🧠 In short:

👉 Child → Parent → Ancestor → Document -->
<!-- button → div → body → document -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container_main {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 300px;
            height: 300px;
            border: 1px solid black;
            /* background-color: red; */
        }

        .container_in {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 200px;
            height: 200px;
            /* background-color: green; */
            border: 1px solid black;
        }

        .container_inner {
            
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 100px;
            border: 1px solid black;
            /* background-color: blue; */
        }
        .b {
            /* background-color: violet; */
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <div class="container_main">
        <div class="container_in">
            <div class="container_inner"> <button class="b">
                Change Color
            </button></div>
        </div>
    </div>

    <script>
        let main= document.querySelector('.container_main');
        main.addEventListener('click', (e)=> { 
            main.style.backgroundColor = 'red';
            alert('main');
            e.stopPropagation();
        });
        let in_ = document.querySelector('.container_in');
        in_.addEventListener('click', (e)=> { 
            in_.style.backgroundColor = 'green';
                alert('in');
                e.stopPropagation();
        });
        let inner= document.querySelector('.container_inner');
        inner.addEventListener('click', (e)=> { 
            inner.style.backgroundColor = 'blue';
                alert('inner');
                e.stopPropagation();
        });
        
        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
              color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
          }

        // ********setInterval********
        // Executes a function repeatedly at fixed intervals (in milliseconds) until it is stopped.
        setInterval(() => {
            
             document.body.style.backgroundColor = getRandomColor();
            

        }, 1000);
        
        
        // ********setTimeout********
        // Executes a function once after a specified delay (in milliseconds).

        setTimeout(() => {
            document.body.style.backgroundColor = 'black';

        }, 5000);
    </script>
</body>
</html>
