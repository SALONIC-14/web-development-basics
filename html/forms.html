<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>Student Details</h1>
    <form action="post">
        <div>
            <label for="name">ENTER YOUR NAME</label>
            <input type="text" id="name" name="username" placeholder="Enter name">
            
        </div>
            
        <input type="radio" name="GENDER" id="male"     placeholder="MALE">
        <label for="male">Male</label>
        <input type="radio" id="female" name="GENDER" placeholder="FEMALE">
        <label for="female">Female</label>
        <div>
            <label for="year">Select your year</label>
            <select name="year" id="year">
                <option value="FE">FE</option>
                <option value="SE">SE</option>
                <option value="TE">TE</option>
                <option value="BE">BE</option>
            </select>
        </div>

        <div>
            <br>
            <input type="checkbox" id="checkbox" name="Agree",value="yes">
            <label for="checkbox"> I Agree My All Information is correct</label>
        </div>
        <div>
            <div>
                <br>
            </div>
            <label for="suggest">Any Suggestions</label>
            <br>
            <textarea name="Suggestions" id="suggest" rows="5" cols="44"></textarea>
        </div>


        
        <div>
            <br><br><br><br>
        </div>
        <div>
            <h2>Quiz Question</h2>
            <label for="name"> Enter your name</label>
            <input type="text" name="name" id="name" placeholder="Enter your name">
        </div>
        <div>
            <label for="city"> Enter your City</label>
            <input type="text" name="city" id="city" placeholder="Enter your city">
        </div>
        <div>
            <label for="pincode"> Enter your Pincode</label>
            <input type="number" name="pincode" id="pincode" placeholder="Enter your pincode">
        </div>
        <div>
            <button style="background-color: rgb(121, 97, 227);">Submit</button>
        </div>
    </form>
</body>
</html>
